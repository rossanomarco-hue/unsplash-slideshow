<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Slideshow Fully Kiosk</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: black;
      overflow: hidden;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 1s ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <img id="slideshow" src="" alt="Slideshow">

  <script>
    const keywords = ["nature", "landscape", "city"];
    const slideshow = document.getElementById("slideshow");
    const interval = 10000; // cambia ogni 10 secondi

    function getRandomKeyword() {
      return keywords[Math.floor(Math.random() * keywords.length)];
    }

    function loadImage() {
      const keyword = getRandomKeyword();
      const url = `https://source.unsplash.com/1920x1200/?${keyword}&sig=${Math.random()}`;
      slideshow.style.opacity = 0; // fade out
      setTimeout(() => {
        slideshow.src = url;
        slideshow.style.opacity = 1; // fade in
      }, 500);
    }

    loadImage();
    setInterval(loadImage, interval);
  </script>
</body>
</html>
