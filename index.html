<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fully Kiosk Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
<img id="slide" src="">
<script>
  // Funzione per cambiare immagine
  function newImage() {
    const img = document.getElementById('slide');
    // Unsplash casuale, tema natura / landscape
    img.src = 'https://source.unsplash.com/1920x1200/?nature,landscape&sig=' + Math.floor(Math.random()*1000);
  }

  // Mostra subito la prima immagine
  newImage();

  // Cambia immagine ogni 60 secondi
  setInterval(newImage, 60000);
</script>
</body>
</html>
