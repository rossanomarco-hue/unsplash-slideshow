<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fully Kiosk Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
<img id="slide" src="https://picsum.photos/id/1018/1920/1200">
<script>
  // Lista di immagini casuali a tema: natura, panorami, città
  const images = [
    "https://picsum.photos/id/1018/1920/1200", // natura
    "https://picsum.photos/id/1025/1920/1200", // animali/natura
    "https://picsum.photos/id/1033/1920/1200", // città
    "https://picsum.photos/id/1042/1920/1200", // panorama
    "https://picsum.photos/id/1056/1920/1200", // città/panorama
    "https://picsum.photos/id/1062/1920/1200"  // montagna/natura
  ];

  function randomImage() {
    const index = Math.floor(Math.random() * images.length);
    document.getElementById('slide').src = images[index];
  }

  // Mostra subito un'immagine casuale
  randomImage();

  // Cambia immagine ogni 60 secondi (puoi modificare il tempo)
  setInterval(randomImage, 60000);
</script>
</body>
</html>
