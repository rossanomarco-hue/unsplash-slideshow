<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>

<img id="slide" src="">

<script>
  const images = [
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto1.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto2.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto3.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto4.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto5.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto6.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto7.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto8.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto9.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto10.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto11.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto12.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto13.jpg"
  ];

  const slide = document.getElementById("slide");
  let lastIndex = -1;

  function randomImage() {
    let index;
    do {
      index = Math.floor(Math.random() * images.length);
    } while (index === lastIndex);

    lastIndex = index;

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 500);
  }

  // Prima immagine subito
  randomImage();

  // Cambio ogni 60 secondi
  setInterval(randomImage, 60000);
</script>

</body>
</html>
