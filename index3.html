<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Pad Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  img {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transition: opacity 1.5s ease-in-out;
  }
</style>
</head>
<body>

<img id="slide">

<script>
document.addEventListener("DOMContentLoaded", function() {

  const images = [
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_1.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_2.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_3.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_4.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_5.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_6.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_7.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_8.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_9.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_10.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_11.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_12.jpg",
    "https://rossanomarco-hue.github.io/unsplash-slideshow/images/foto_13.jpg"
  ];

  const slide = document.getElementById("slide");
  let lastIndex = -1;

  function changeImage() {
    let index;
    do {
      index = Math.floor(Math.random() * images.length);
    } while (index === lastIndex);

    lastIndex = index;

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 800);
  }

  // mostra subito la prima immagine
  slide.src = images[0];
  slide.style.opacity = 1;

  setInterval(changeImage, 60000);

});
</script>

</body>
</html>
