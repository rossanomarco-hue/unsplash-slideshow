<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>

<img id="slide" src="">

<script>
  const images = [
    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg",
    "foto6.jpg",
    "foto7.jpg",
    "foto8.jpg",
    "foto9.jpg",
    "foto10.jpg",
    "foto11.jpg",
    "foto12.jpg",
    "foto13.jpg"
  ];

  const slide = document.getElementById("slide");
  let lastIndex = -1;

  function randomImage() {
    let index;
    do {
      index = Math.floor(Math.random() * images.length);
    } while (index === lastIndex);

    lastIndex = index;

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 500);
  }

  randomImage();
  setInterval(randomImage, 60000); // cambia ogni 60 secondi
</script>

</body>
</html>
