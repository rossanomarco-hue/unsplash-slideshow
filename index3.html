<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Personal Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  img {
    position: absolute;
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>

<img id="slide" src="images/foto1.jpg">

<script>
  const images = [
    "images/foto(1).jpg",
    "images/foto(2).jpg",
    "images/foto(3).jpg",
    "images/foto(4).jpg",
    "images/foto(5).jpg",
    "images/foto(6).jpg",
    "images/foto(7).jpg",
    "images/foto(8).jpg",
    "images/foto(9).jpg",
    "images/foto(10).jpg",
    "images/foto(11).jpg",
    "images/foto(12).jpg",
    "images/foto(13).jpg"  
  ];

  const slide = document.getElementById("slide");

  function randomImage() {
    const index = Math.floor(Math.random() * images.length);
    slide.style.opacity = 0;
    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 500);
  }

  randomImage();
  setInterval(randomImage, 60000); // cambia ogni 60 secondi
</script>

</body>
</html>
