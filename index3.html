<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>

<img id="slide" src="">

<script>
  const images = [
    "images/foto_1.jpg",
    "images/foto_2.jpg",
    "images/foto_3.jpg",
    "images/foto_4.jpg",
    "images/foto_5.jpg",
    "images/foto_6.jpg",
    "images/foto_7.jpg",
    "images/foto_8.jpg",
    "images/foto_9.jpg",
    "images/foto_10.jpg",
    "images/foto_11.jpg",
    "images/foto_12.jpg",
    "images/foto_13.jpg"
  ];

  const slide = document.getElementById("slide");
  let lastIndex = -1;

  function randomImage() {
    let index;
    do {
      index = Math.floor(Math.random() * images.length);
    } while (index === lastIndex);

    lastIndex = index;

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 500);
  }

  // Mostra subito un'immagine
  randomImage();

  // Cambia immagine ogni 60 secondi
  setInterval(randomImage, 60000);
</script>

</body>
</html>
