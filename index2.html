<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fully Kiosk Screensaver</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
<img id="slide" src="https://picsum.photos/id/1018/1920/1200">
<script>
  const images = [
    "https://picsum.photos/id/1018/1920/1200",
    "https://picsum.photos/id/1025/1920/1200",
    "https://picsum.photos/id/1033/1920/1200",
    "https://picsum.photos/id/1042/1920/1200"
  ];
  let index = 0;
  function nextImage() {
    index = (index + 1) % images.length;
    document.getElementById('slide').src = images[index];
  }
  setInterval(nextImage, 60000); // cambia immagine ogni 60 sec
</script>
</body>
</html>
